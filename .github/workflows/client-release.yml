name: Client Release

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - 'client/**'
      - 'launcher/**'
      - 'tools/**'
      - '.github/workflows/client-release.yml'

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: macos-arm64
            bin: client/target/release/isometric-client
            entrypoint: isometric-client
          - os: windows-latest
            platform: windows-x86_64
            bin: client/target/release/isometric-client.exe
            entrypoint: isometric-client.exe
          - os: ubuntu-latest
            platform: linux-x86_64
            bin: client/target/release/isometric-client
            entrypoint: isometric-client

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libx11-dev libxi-dev libgl1-mesa-dev libasound2-dev \
            libudev-dev libxcursor-dev libxrandr-dev libxinerama-dev

      - name: Build client
        run: cargo build --release --manifest-path client/Cargo.toml

      - name: Package client
        run: |
          python tools/package_client.py \
            --platform "${{ matrix.platform }}" \
            --client-dir client \
            --out "dist/client/${{ matrix.platform }}" \
            --bin "${{ matrix.bin }}" \
            --include-db

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: client-${{ matrix.platform }}
          path: dist/client/${{ matrix.platform }}

  manifest:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: client-*
          path: dist/client
          merge-multiple: true

      - name: Build manifest
        run: |
          VERSION=$(python - <<'PY'
          import tomllib
          with open('client/Cargo.toml', 'rb') as f:
              data = tomllib.load(f)
          print(data['package']['version'])
          PY
          )

          python tools/launcher_manifest.py \
            --platform macos-arm64 \
            --input dist/client/macos-arm64 \
            --entrypoint isometric-client \
            --version "$VERSION" \
            --out dist/manifest.json

          python tools/launcher_manifest.py \
            --platform windows-x86_64 \
            --input dist/client/windows-x86_64 \
            --entrypoint isometric-client.exe \
            --version "$VERSION" \
            --out dist/manifest.json \
            --merge

          python tools/launcher_manifest.py \
            --platform linux-x86_64 \
            --input dist/client/linux-x86_64 \
            --entrypoint isometric-client \
            --version "$VERSION" \
            --out dist/manifest.json \
            --merge

      - name: Upload manifest artifact
        uses: actions/upload-artifact@v4
        with:
          name: client-manifest
          path: dist/manifest.json

      - name: Upload to R2 (optional)
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          R2_PREFIX: ${{ vars.R2_PREFIX }}
        run: |
          set -euo pipefail

          if [ -z "${R2_ACCOUNT_ID:-}" ] || [ -z "${R2_BUCKET:-}" ] || [ -z "${AWS_ACCESS_KEY_ID:-}" ] || [ -z "${AWS_SECRET_ACCESS_KEY:-}" ]; then
            echo "R2 secrets not set; skipping upload."
            exit 0
          fi

          sudo apt-get update
          sudo apt-get install -y awscli

          PREFIX="${R2_PREFIX:-isometric}"
          ENDPOINT="https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com"

          aws s3 sync dist/client "s3://${R2_BUCKET}/${PREFIX}" \
            --endpoint-url "$ENDPOINT" \
            --cache-control "public, max-age=31536000, immutable" \
            --no-progress

          aws s3 cp dist/manifest.json "s3://${R2_BUCKET}/${PREFIX}/manifest.json" \
            --endpoint-url "$ENDPOINT" \
            --cache-control "no-cache" \
            --no-progress
