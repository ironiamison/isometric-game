name: Client Release

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - 'client/**'
      - 'launcher/**'
      - 'crates/aeven-protocol/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'rust-toolchain.toml'
      - 'tools/**'
      - '.github/workflows/client-release.yml'

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: macos-arm64
            bin: client/target/release/new-aeven
            entrypoint: new-aeven
          - os: windows-latest
            platform: windows-x86_64
            bin: client/target/release/new-aeven.exe
            entrypoint: new-aeven.exe
          - os: ubuntu-latest
            platform: linux-x86_64
            bin: client/target/release/new-aeven
            entrypoint: new-aeven

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@1.92.0

      - name: Install Linux deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libx11-dev libxi-dev libgl1-mesa-dev libasound2-dev \
            libudev-dev libxcursor-dev libxrandr-dev libxinerama-dev

      - name: Build client
        env:
          AEVEN_SERVER_URL: https://aeven.xyz
          AEVEN_WS_URL: wss://aeven.xyz
        run: cargo build --locked --release --manifest-path client/Cargo.toml --target-dir client/target

      - name: Package client
        shell: bash
        run: |
          python tools/package_client.py \
            --platform "${{ matrix.platform }}" \
            --client-dir client \
            --out "dist/client/${{ matrix.platform }}" \
            --bin "${{ matrix.bin }}" \
            --include-db \
            --atlas-only

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}
          path: dist/client/${{ matrix.platform }}

  manifest:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: '*'
          path: dist/client

      - name: Build manifest
        run: |
          VERSION=$(python - <<'PY'
          import tomllib
          with open('client/Cargo.toml', 'rb') as f:
              data = tomllib.load(f)
          print(data['package']['version'])
          PY
          )
          PUBLIC_DOWNLOAD_BASE="${PUBLIC_DOWNLOAD_BASE:-}"
          BASE_URL="${PUBLIC_DOWNLOAD_BASE:-https://dl.aeven.xyz/isometric}"
          VERSION_PREFIX="v${VERSION}"

          python tools/launcher_manifest.py \
            --platform macos-arm64 \
            --input dist/client/macos-arm64 \
            --entrypoint new-aeven \
            --version "$VERSION" \
            --url-base "${BASE_URL}/${VERSION_PREFIX}" \
            --out dist/manifest.json

          python tools/launcher_manifest.py \
            --platform windows-x86_64 \
            --input dist/client/windows-x86_64 \
            --entrypoint new-aeven.exe \
            --version "$VERSION" \
            --url-base "${BASE_URL}/${VERSION_PREFIX}" \
            --out dist/manifest.json \
            --merge

          python tools/launcher_manifest.py \
            --platform linux-x86_64 \
            --input dist/client/linux-x86_64 \
            --entrypoint new-aeven \
            --version "$VERSION" \
            --url-base "${BASE_URL}/${VERSION_PREFIX}" \
            --out dist/manifest.json \
            --merge

      - name: Upload manifest artifact
        uses: actions/upload-artifact@v4
        with:
          name: client-manifest
          path: dist/manifest.json

      - name: Upload to R2 (optional)
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          R2_PREFIX: ${{ vars.R2_PREFIX }}
          PUBLIC_DOWNLOAD_BASE: ${{ vars.PUBLIC_DOWNLOAD_BASE }}
        run: |
          set -euo pipefail

          if [ -z "${R2_ACCOUNT_ID:-}" ] || [ -z "${R2_BUCKET:-}" ] || [ -z "${AWS_ACCESS_KEY_ID:-}" ] || [ -z "${AWS_SECRET_ACCESS_KEY:-}" ]; then
            echo "R2 secrets not set; skipping upload."
            exit 0
          fi

          python -m pip install --upgrade --user awscli
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

          PREFIX="${R2_PREFIX:-isometric}"
          ENDPOINT="https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com"
          VERSION=$(python - <<'PY'
          import tomllib
          with open('client/Cargo.toml', 'rb') as f:
              data = tomllib.load(f)
          print(data['package']['version'])
          PY
          )

          aws s3 sync dist/client "s3://${R2_BUCKET}/${PREFIX}/v${VERSION}" \
            --endpoint-url "$ENDPOINT" \
            --cache-control "public, max-age=31536000, immutable" \
            --no-progress

          aws s3 cp dist/manifest.json "s3://${R2_BUCKET}/${PREFIX}/manifest.json" \
            --endpoint-url "$ENDPOINT" \
            --cache-control "no-cache" \
            --no-progress
