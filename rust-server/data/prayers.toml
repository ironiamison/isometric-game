# Prayer definitions
# Each prayer provides temporary buffs at the cost of draining prayer points.
# Only one prayer per category can be active at a time.

# ============================================================================
# Tier 1 Prayers (Level 1-9)
# ============================================================================

[clarity]
name = "Clarity"
description = "Clears the mind, providing a slight boost to combat accuracy."
level_req = 1
category = "attack"
effect_type = "attack_bonus"
effect_value = 5.0
drain_rate = 1.0
icon = "prayer_clarity"

