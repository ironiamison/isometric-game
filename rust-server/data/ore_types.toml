# Ore Types Configuration
# Each ore type defines the GIDs (from objects.tsx tileset), level requirements,
# XP rewards, and respawn behavior.
#
# GID CONVERSION: GID = 1162 + mapper_sprite_id
# Example: mapper id 454 → GID 1616

[rocks.copper]
# Copper ore rocks: mapper id 454
gids = [1616]
level_required = 1
ore_item_id = "copper_ore"
xp_per_ore = 17
success_chance = 0.12
depletion_chance = 0.15
respawn_time_min = 4000
respawn_time_max = 8000

[rocks.tin]
# Tin ore rocks (reuses old iron rock sprite)
gids = [1581]
level_required = 5
ore_item_id = "tin_ore"
xp_per_ore = 17
success_chance = 0.12
depletion_chance = 0.15
respawn_time_min = 4000
respawn_time_max = 8000

