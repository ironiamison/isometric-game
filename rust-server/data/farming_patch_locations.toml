# Farming patch locations in the world.
#
# (x, y) is the NW anchor tile; the patch footprint spans width × height tiles.
# `capacity` = how many plants the patch holds (seeds consumed at planting,
# yield multiplier). Omitted width/height/capacity default to 1.
#
#  - Allotment "beds" are 2×2 (capacity 4): plant 4 seeds, harvest ~4× produce.
#  - Trees are 2×2 (capacity 1): one sapling, rendered centered, chopped down.
#  - Herb/cactus patches stay 1×1.
#
# Patches are spaced so 2×2 footprints never overlap, kept within the original
# farmland area (x -7..1, y -30..-22). A seed can only be planted in a patch
# whose `patch_type` matches the crop's `category`.

# ===== Plot 1 (free) =====

[[patches]]
id = "p1_allotment_1"
x = -7
y = -30
patch_type = "allotment"
plot = 1
width = 2
height = 2
capacity = 4

[[patches]]
id = "p1_tree_1"
x = -5
y = -30
patch_type = "tree"
plot = 1
width = 2
height = 2
capacity = 1

[[patches]]
id = "p1_herb_1"
x = -7
y = -28
patch_type = "herb"
plot = 1

[[patches]]
id = "p1_cactus_1"
x = -6
y = -28
patch_type = "cactus"
plot = 1

[[patches]]
id = "p1_allotment_2"
x = -5
y = -28
patch_type = "allotment"
plot = 1
width = 2
height = 2
capacity = 4

