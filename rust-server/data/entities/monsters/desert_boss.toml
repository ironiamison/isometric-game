# Desert Wurm Boss and explosive minions
# Boss fight in desert_boss_cave instance

# =============================================================================
# Desert Wurm - Main boss, level 60
# =============================================================================

[desert_wurm]
display_name = "Desert Wurm"
sprite = "big_wurm"
animation_type = "boss_wurm"
size = 2
description = "A massive wurm that burrows through the desert sands."
tags = ["desert"]

[desert_wurm.stats]
level = 60
max_hp = 217
damage = 6
attack_bonus = 12
defence_bonus = 5
attack_range = 1
aggro_range = 999
chase_range = 999
move_cooldown_ms = 600
attack_cooldown_ms = 1800
respawn_time_ms = 0

[desert_wurm.rewards]
exp_base = 500
gold_min = 10000
gold_max = 50000

# Always drops
[[desert_wurm.loot]]
item_id = "wurm_bones"
drop_chance = 1.0
quantity_min = 1
quantity_max = 3

# Resource roll - always picks one resource
[[desert_wurm.loot_tables]]
name = "resource"
chance = 1.0

[[desert_wurm.loot_tables.entries]]
item_id = "maple_log"
weight = 15
quantity_min = 15
quantity_max = 30

[[desert_wurm.loot_tables.entries]]
item_id = "coal_ore"
weight = 15
quantity_min = 15
quantity_max = 30

[[desert_wurm.loot_tables.entries]]
item_id = "iron_ore"
weight = 12
quantity_min = 10
quantity_max = 25

[[desert_wurm.loot_tables.entries]]
item_id = "yew_log"
weight = 10
quantity_min = 10
quantity_max = 25

[[desert_wurm.loot_tables.entries]]
item_id = "mithril_ore"
weight = 8
quantity_min = 10
quantity_max = 20

[[desert_wurm.loot_tables.entries]]
item_id = "adamant_ore"
weight = 5
quantity_min = 5
quantity_max = 15

# Seed roll - always picks one seed
[[desert_wurm.loot_tables]]
name = "seed"
chance = 1.0

[[desert_wurm.loot_tables.entries]]
item_id = "strawberry_seed"
weight = 10
quantity_min = 4
quantity_max = 8

[[desert_wurm.loot_tables.entries]]
item_id = "watermelon_seed"
weight = 8
quantity_min = 3
quantity_max = 6

[[desert_wurm.loot_tables.entries]]
item_id = "cactus_seed"
weight = 6
quantity_min = 2
quantity_max = 5

[[desert_wurm.loot_tables.entries]]
item_id = "nightthorn_seed"
weight = 5
quantity_min = 2
quantity_max = 4

[[desert_wurm.loot_tables.entries]]
item_id = "bloodcap_seed"
weight = 3
quantity_min = 1
quantity_max = 3

# Rare roll - 1% wurm blade, 4% ancient fragment, 95% nothing
[[desert_wurm.loot_tables]]
name = "rare"
chance = 1.0

[[desert_wurm.loot_tables.entries]]
item_id = "nothing"
weight = 95

[[desert_wurm.loot_tables.entries]]
item_id = "ancient_fragment"
weight = 4
quantity_min = 1
quantity_max = 3

[[desert_wurm.loot_tables.entries]]
item_id = "wurm_blade"
weight = 1

[desert_wurm.behaviors]
hostile = true
wander_enabled = false
no_shadow = true
render_offset_y = 21.0

# =============================================================================
# Exploding Rock - Explosive minion (1 HP, chases player, explodes on contact)
# =============================================================================

[wurm_minion]
display_name = "Exploding Rock"
sprite = "rockexplode"
animation_type = "exploding_rock"
description = "A volatile rock that detonates on contact."

[wurm_minion.stats]
level = 30
max_hp = 1
damage = 0
attack_bonus = 0
defence_bonus = 0
attack_range = 1
aggro_range = 999
chase_range = 999
move_cooldown_ms = 500
attack_cooldown_ms = 9999999
respawn_time_ms = 0

[wurm_minion.rewards]
exp_base = 0
gold_min = 0
gold_max = 0

[wurm_minion.behaviors]
hostile = true
wander_enabled = false
render_offset_y = 32.0
no_shadow = true

# =============================================================================
# Wurm Battle Master - Loot distribution NPC for the desert wurm boss fight
# =============================================================================

[wurm_battle_master]
display_name = "Battle Master"
sprite = "bandit_one"
animation_type = "standard"
description = "A battle-hardened warrior who distributes the spoils of the wurm hunt."

[wurm_battle_master.stats]
max_hp = 500
damage = 0
attack_range = 0
aggro_range = 0
chase_range = 0
move_cooldown_ms = 0
attack_cooldown_ms = 0
respawn_time_ms = 0

[wurm_battle_master.rewards]
exp_base = 0
gold_min = 0
gold_max = 0

[wurm_battle_master.behaviors]
hostile = false
friendly = true
wander_enabled = false
facing = "down"
boss_rewards = true

[wurm_battle_master.speech]
radius = 5
interval_min_ms = 30000
interval_max_ms = 60000
messages = [
    "Slay the wurm and I'll see you're rewarded.",
    "The beast lurks beneath these sands...",
    "Speak to me after the hunt for your share of the spoils.",
]

[wurm_battle_master.dialogue]
greeting = "Hail, hunter! Defeat the Desert Wurm and I'll distribute the spoils."
