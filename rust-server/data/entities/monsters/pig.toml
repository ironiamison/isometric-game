# Pig monster - the classic starting enemy

[pig]
display_name = "Piggy"
sprite = "pig"
animation_type = "standard"
description = "A wild piggy that roams the forest."

[pig.stats]
level = 1
max_hp = 15
damage = 2
attack_bonus = 0
defence_bonus = 0
attack_range = 1
aggro_range = 5
chase_range = 5
move_cooldown_ms = 600
attack_cooldown_ms = 2000
respawn_time_ms = 10000

[pig.rewards]
exp_base = 25
gold_min = 5
gold_max = 15

[[pig.loot]]
item_id = "piglet"
drop_chance = 0.20
quantity_min = 1
quantity_max = 1

[[pig.loot]]
item_id = "health_potion"
drop_chance = 0.20
quantity_min = 1
quantity_max = 1

[[pig.loot]]
item_id = "potato_seed"
drop_chance = 0.08
quantity_min = 1
quantity_max = 2

[[pig.loot]]
item_id = "regular_bones"
drop_chance = 1.0
quantity_min = 1
quantity_max = 1

[pig.behaviors]
hostile = true
wander_enabled = true
wander_radius = 4
wander_pause_min_ms = 2000
wander_pause_max_ms = 5000

