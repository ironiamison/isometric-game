# Desert Creatures - Enemies and wildlife found in the desert region

# =============================================================================
# Evil Cactus - Hostile desert plant
# =============================================================================

[evil_cactus]
display_name = "Evil Cactus"
sprite = "evil_cactus"
animation_type = "standard"
description = "A prickly cactus animated by dark desert magic. Its spines are razor-sharp."
tags = ["desert"]

[evil_cactus.stats]
level = 22
max_hp = 95
damage = 13
attack_bonus = 7
defence_bonus = 14
attack_range = 1
aggro_range = 4
chase_range = 5
move_cooldown_ms = 650
attack_cooldown_ms = 2000
respawn_time_ms = 40000

[evil_cactus.rewards]
exp_base = 110
gold_min = 15
gold_max = 40

[[evil_cactus.loot]]
item_id = "cactus_seed"
drop_chance = 0.05
quantity_min = 1
quantity_max = 1

[[evil_cactus.loot]]
item_id = "big_bones"
drop_chance = 0.4
quantity_min = 1
quantity_max = 1

[evil_cactus.behaviors]
hostile = true

wander_enabled = true
wander_radius = 2
wander_pause_min_ms = 4000
wander_pause_max_ms = 8000

