# KOTH (King of the Hill) enemy variants
# High chase/aggro range so they always charge the player
# No respawn - wave system handles spawning

# =============================================================================
# KOTH Slime - Waves 1-5 (easiest)
# =============================================================================

[koth_slime]
display_name = "Hill Slime"
sprite = "slime"
animation_type = "standard"
description = "A gelatinous creature drawn to the hilltop."

[koth_slime.stats]
level = 3
max_hp = 20
damage = 2
attack_bonus = 2
defence_bonus = 0
attack_range = 1
aggro_range = 999
chase_range = 999
move_cooldown_ms = 500
attack_cooldown_ms = 2000
respawn_time_ms = 999999

[koth_slime.rewards]
exp_base = 20
gold_min = 0
gold_max = 0

[koth_slime.behaviors]
hostile = true
wander_enabled = false

