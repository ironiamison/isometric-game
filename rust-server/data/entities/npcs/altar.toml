# Altar - Sacred objects for prayer and bone offerings
# Players can pray at altars to restore prayer points
# Bones can be offered for bonus Prayer XP (2.5x normal bury XP)

# ============================================================================
# Basic Altar - Found in villages and churches
# ============================================================================
[altar]
display_name = "Altar"
sprite = "altar"
animation_type = "static"
description = "A sacred altar devoted to the gods. You can pray here to restore prayer points, or offer bones for enhanced experience."

[altar.stats]
max_hp = 9999
damage = 0
attack_range = 0
aggro_range = 0
chase_range = 0
move_cooldown_ms = 0
attack_cooldown_ms = 0
respawn_time_ms = 0

[altar.rewards]
exp_base = 0
gold_min = 0
gold_max = 0

[altar.behaviors]
hostile = false
altar = true

[altar.dialogue]
greeting = "You feel a divine presence emanating from the altar."

