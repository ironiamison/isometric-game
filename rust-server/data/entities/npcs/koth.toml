# KOTH (King of the Hill) NPCs

# ============================================================================
# Battle Master - Rewards claim NPC near the KOTH arena entrance
# ============================================================================
[koth_battle_master]
display_name = "Battle Master"
sprite = "battle_master"
animation_type = "humanoid"
description = "A scarred veteran who oversees the King of the Hill arena. Speak to him to claim your battle rewards."

[koth_battle_master.stats]
max_hp = 500
damage = 0
attack_range = 0
aggro_range = 0
chase_range = 0
move_cooldown_ms = 0
attack_cooldown_ms = 0
respawn_time_ms = 0

[koth_battle_master.rewards]
exp_base = 0
gold_min = 0
gold_max = 0

[koth_battle_master.behaviors]
hostile = false
friendly = true
koth_rewards = true
wander_enabled = false
facing = "down"

[koth_battle_master.speech]
radius = 5
interval_min_ms = 30000
interval_max_ms = 60000
messages = [
    "Prove your worth in the arena!",
    "Fight well, and the rewards are yours.",
    "I hold your spoils of war. Speak to me when you're ready.",
    "The hill awaits its next champion.",
]

[koth_battle_master.dialogue]
greeting = "Hail, warrior! I safeguard the rewards earned in battle."
