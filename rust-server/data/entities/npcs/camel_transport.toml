# Camel Transport - Desert travel NPCs

# ============================================================================
# Camel Transport
# ============================================================================
[camel_transport]
display_name = "Camel"
sprite = "camel"
animation_type = "standard"
description = "A sturdy desert camel ready to carry travelers across the sands."

[camel_transport.stats]
max_hp = 150
damage = 0
attack_range = 0
aggro_range = 0
chase_range = 0
move_cooldown_ms = 0
attack_cooldown_ms = 0
respawn_time_ms = 0

[camel_transport.rewards]
exp_base = 0
gold_min = 0
gold_max = 0

[camel_transport.behaviors]
hostile = false
friendly = true
port_master = true
wander_enabled = false
facing = "down"

[camel_transport.port]
destinations = [
    { name = "Deep Desert", x = -410, y = -142, cost = 1500 },
    { name = "Desert Pass", x = -307, y = -212, cost = 1000 },
    { name = "Forbidden Cave", x = -235, y = -96, cost = 2000 },
]

[camel_transport.speech]
radius = 5
interval_min_ms = 25000
interval_max_ms = 45000
messages = [
    "Need a ride across the desert?",
    "This camel can take you anywhere in the sands.",
    "Hop on, traveler. The desert awaits.",
    "Fastest way across the dunes, right here.",
]

[camel_transport.dialogue]
greeting = "Where would you like to travel? Climb aboard and hold on tight."
