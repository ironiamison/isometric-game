[slayer_master_chaeldar.speech]
radius = 5
interval_min_ms = 30000
interval_max_ms = 50000
messages = [
    "Only the strongest survive my assignments.",
    "The creatures I send you after will test every skill you have.",
    "Rock golems, reapers, witches... my tasks are not for the faint-hearted.",
    "Slayer points can unlock rare monsters. Spend them wisely.",
    "Many adventurers seek my tasks. Few return unchanged.",
]

[slayer_master_chaeldar.dialogue]
greeting = "So, you think yourself worthy of my tasks? Very well. The monsters I assign will push you to your limits."
