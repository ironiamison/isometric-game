aggro_range = 0
chase_range = 0
move_cooldown_ms = 600
attack_cooldown_ms = 0
respawn_time_ms = 0

[slayer_master_mazchna.rewards]
exp_base = 0
gold_min = 0
gold_max = 0

[slayer_master_mazchna.behaviors]
hostile = false
slayer_master = true
wander_enabled = true
wander_radius = 2
wander_pause_min_ms = 5000
wander_pause_max_ms = 10000

[slayer_master_mazchna.speech]
radius = 5
interval_min_ms = 25000
interval_max_ms = 45000
messages = [
    "The swamp breeds dangerous creatures. Perfect for slayer work.",
    "You'll need more than a sharp blade to handle my tasks.",
    "I don't assign tasks to the unprepared. Prove your worth first.",
    "The wilds are crawling with monsters that need culling.",
    "A true slayer knows when to fight and when to prepare.",
]

[slayer_master_mazchna.dialogue]
greeting = "You seek a challenge? I assign tasks to those who have proven themselves in battle. Show me you are ready."

