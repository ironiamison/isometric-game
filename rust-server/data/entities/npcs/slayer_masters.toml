# Mazchna - Intermediate Slayer Master
# ============================================================================
[slayer_master_mazchna]
display_name = "Mazchna"
sprite = "wise_man"
animation_type = "humanoid"
description = "A stern slayer master who assigns tasks to seasoned hunters."

[slayer_master_mazchna.stats]
max_hp = 300
damage = 0
