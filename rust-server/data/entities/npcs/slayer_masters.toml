# Slayer Masters - NPCs that assign slayer tasks to players

# ============================================================================
# Turael - Beginner Slayer Master
# ============================================================================
[slayer_master_turael]
display_name = "Turael"
sprite = "village_elder"
animation_type = "humanoid"
description = "A weathered slayer master who trains beginners in the art of monster hunting."

[slayer_master_turael.stats]
max_hp = 200
damage = 0
attack_range = 0
aggro_range = 0
chase_range = 0
move_cooldown_ms = 600
attack_cooldown_ms = 0
respawn_time_ms = 0

[slayer_master_turael.rewards]
exp_base = 0
gold_min = 0
gold_max = 0

[slayer_master_turael.behaviors]
hostile = false
slayer_master = true
wander_enabled = true
wander_radius = 2
wander_pause_min_ms = 6000
wander_pause_max_ms = 12000

[slayer_master_turael.speech]
radius = 5
interval_min_ms = 25000
interval_max_ms = 45000
messages = [
    "Every great slayer started with humble tasks.",
    "The creatures near town may seem weak, but they teach you the basics.",
    "Come to me if you need a task. I'll find something suitable.",
    "Patience and persistence - that's the slayer's way.",
    "Don't underestimate the lowly monsters. They can still bite.",
]

[slayer_master_turael.dialogue]
greeting = "Welcome, adventurer. Looking to take on a slayer task? I have work suited for those just starting out."

