# Village NPCs - Quest Givers and Friendly NPCs

# ============================================================================
# Elder Mara - Cursed Lands Quest Giver (Ruined Village)
# ============================================================================
[elder_villager]
display_name = "Elder Mara"
sprite = "village_elder"
animation_type = "humanoid"
description = "The weary elder of the ruined village. She carries the weight of her people's suffering."

[elder_villager.stats]
max_hp = 200
damage = 0
attack_range = 0
aggro_range = 0
chase_range = 0
move_cooldown_ms = 0
attack_cooldown_ms = 0
respawn_time_ms = 0

[elder_villager.rewards]
exp_base = 0
gold_min = 0
gold_max = 0

[elder_villager.behaviors]
hostile = false
quest_giver = true

[elder_villager.quest_giver]
available_quests = ["what_happened_here", "spreading_rot"]

[elder_villager.speech]
radius = 5
interval_min_ms = 20000
interval_max_ms = 40000
messages = [
    "The old forest isn't what it used to be...",
    "I remember when this village was just a few huts.",
    "Adventurer, I could use your help.",
    "The corruption came without warning...",
    "Stay vigilant. These lands are not safe.",
]

[elder_villager.dialogue]
greeting = "You survived... thank the light. The corruption came without warning. Our village lies in ruins."
quest_available = "I have a task that might help us understand what happened here."
quest_complete = "You've done well. Perhaps there is hope for us yet."

# ============================================================================
# Blacksmith - Future merchant/craftsman
# ============================================================================
[blacksmith]
display_name = "Blacksmith"
sprite = "blacksmith"
animation_type = "humanoid"
description = "The village blacksmith. He can repair and improve equipment."

[blacksmith.stats]
max_hp = 150
damage = 0
attack_range = 0
aggro_range = 0
chase_range = 0
move_cooldown_ms = 600
attack_cooldown_ms = 0
respawn_time_ms = 0

[blacksmith.rewards]
exp_base = 0
gold_min = 0
gold_max = 0

[blacksmith.behaviors]
hostile = false
merchant = true
craftsman = true
wander_enabled = true
wander_radius = 2
wander_pause_min_ms = 5000
wander_pause_max_ms = 10000

[blacksmith.merchant]
shop_id = "blacksmith"
buy_multiplier = 0.5
sell_multiplier = 1.0
restock_interval_minutes = 5

[blacksmith.speech]
radius = 5
interval_min_ms = 25000
interval_max_ms = 45000
messages = [
    "Fine steel doesn't forge itself...",
    "I've got blades sharp enough to split a hair.",
    "Need repairs? Bring it here.",
    "Business has been slow since the corruption spread.",
    "A good weapon could save your life out there.",
]

[blacksmith.dialogue]
greeting = "Need something forged? I'm your man."
shop_open = "Take a look at my wares."

