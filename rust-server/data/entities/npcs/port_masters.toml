# Port Masters - Travel NPCs at docks/ports

# ============================================================================
# New Aeven Port Master (-43, -222)
# ============================================================================
[port_master_new_aeven]
display_name = "Port Master"
sprite = "lee"
animation_type = "humanoid"
description = "A seasoned sailor who arranges passage between ports."

[port_master_new_aeven.stats]
max_hp = 150
damage = 0
attack_range = 0
aggro_range = 0
chase_range = 0
move_cooldown_ms = 0
attack_cooldown_ms = 0
respawn_time_ms = 0

[port_master_new_aeven.rewards]
exp_base = 0
gold_min = 0
gold_max = 0

[port_master_new_aeven.behaviors]
hostile = false
friendly = true
port_master = true
wander_enabled = false
facing = "down"

[port_master_new_aeven.port]
destinations = [
    { name = "Desert Port", x = -206, y = -240, cost = 250 },
    { name = "Oakshore Port", x = 37, y = 54, cost = 50 },
]

[port_master_new_aeven.speech]
radius = 5
interval_min_ms = 25000
interval_max_ms = 45000
messages = [
    "Need passage? I can arrange a voyage.",
    "The seas are calm today. Good for travel.",
    "All aboard! Next ship departs shortly.",
    "Safe travels, adventurer.",
]

[port_master_new_aeven.dialogue]
greeting = "Ahoy! Looking for passage? Here are the routes I can offer."

