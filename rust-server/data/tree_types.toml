# Tree Types Configuration
# Each tree type defines the GIDs (from objects.tsx tileset), level requirements,
# XP rewards, and respawn behavior.
#
# GID CONVERSION: GID = 1162 + sprite_filename
# Example: 101.png tree sprite → GID 1263

[trees]

[trees.oak]
# Oak trees: sprites 101, 102, 103, 286-290, 647, 648, 831
# GIDs = 1162 + sprite_number
gids = [1263, 1264, 1265, 1448, 1449, 1450, 1451, 1452, 1809, 1810, 1993]
level_required = 1
log_item_id = "oak_log"
xp_per_log = 25
success_chance = 0.10  # 10% base chance - tool and level add bonus
depletion_chance = 0.15  # 15% chance tree depletes on successful chop
respawn_time_min = 5000  # ms
respawn_time_max = 10000  # ms

