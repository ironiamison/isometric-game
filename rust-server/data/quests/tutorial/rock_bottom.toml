[quest]
id = "rock_bottom"
name = "Rock Bottom"
description = "Miner Mike wants to teach you the basics of mining. Mine some copper rocks to prove your skill."
giver_npc = "miner_mike"
level_required = 1
repeatable = false
lua_script = "tutorial/rock_bottom.lua"

[[quest.objectives]]
id = "mine_copper_rocks"
type = "deplete_rock"
target = "copper"
count = 5
description = "Mine 5 copper rocks"

[[quest.objectives]]
id = "return_to_mac"
type = "talk_to"
target = "miner_mike"
description = "Return to Miner Mike"
sequential = true

[quest.rewards]
exp = 250
gold = 50
items = [
    { id = "iron_pickaxe", count = 1 },
]

[quest.dialogue]
offer = "So you want to learn mining, eh? It's tough work - but the ore's worth every swing. Tell you what, I'll lend you my old bronze pickaxe. Go mine five copper rocks nearby. Show me you've got what it takes!"
accept = "Here's a bronze pickaxe to get you started. Equip it, face a rock, and keep swinging until it crumbles! The rocks grow back, so don't worry about mining 'em all. Come back when you've mined five!"
progress = "Still working on those rocks? Keep at it! Remember - equip the pickaxe and swing until the rock crumbles."
complete = "Five copper rocks smashed! You've got a natural talent for this. Here, take this iron pickaxe - it's sturdier and faster than that old bronze one. My shop's always open if you need better gear. Happy mining!"
