# Rot Watch - repeatable cursed-lands cleanup quest

[quest]
id = "rot_watch"
name = "Rot Watch"
description = "Elder Mara needs constant pressure kept on the corrupted wildlife outside the ruined village."
giver_npc = "elder_villager"
level_required = 1
repeatable = true
lua_script = "repeatables/rot_watch.lua"

[quest.chain]
previous = "what_happened_here"

[[quest.objectives]]
id = "kill_corrupted_pigs"
type = "kill_monster"
target = "corrupted_pig"
count = 10
description = "Slay 10 corrupted pigs"

[[quest.objectives]]
id = "collect_spoiled_meat"
type = "collect_item"
target = "spoiled_meat"
count = 5
description = "Collect 5 spoiled meat"

[[quest.objectives]]
id = "return_to_elder"
type = "talk_to"
target = "elder_villager"
description = "Return to Elder Mara"
sequential = true

[quest.rewards]
exp = 325
gold = 240
items = [
    { id = "weak_health_potion", count = 1 },
]

[quest.dialogue]
offer = "The corruption never rests. We have to keep thinning the infected beasts before they press back into the ruins. Can you make another patrol?"
accept = "Go back to the old farms. Put down 10 corrupted pigs and bring me 5 pieces of spoiled meat so we can keep watching how the sickness spreads."
progress = "Every patrol buys us time, but only if you finish the full sweep."
complete = "Good. The line held another day. Take this and return when you're ready to push the corruption back again."
