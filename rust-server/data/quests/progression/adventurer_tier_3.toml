# Adventurer Tasks III - Strong early progression benchmark

[quest]
id = "adventurer_tier_3"
name = "Adventurer Tasks III"
description = "The Adventurer Guide's third tier tests discipline across combat, farming growth, and money management."
giver_npc = "adventurer_guide"
level_required = 8
repeatable = false
lua_script = "progression/adventurer_tier_3.lua"

[quest.chain]
previous = "adventurer_tier_2"

[[quest.objectives]]
id = "kill_pigs"
type = "kill_monster"
target = "pig"
count = 30
description = "Defeat 30 pigs"

[[quest.objectives]]
id = "kill_wild_boars"
type = "kill_monster"
target = "wild_boar"
count = 20
description = "Defeat 20 wild boars"

[[quest.objectives]]
id = "reach_farming_12"
type = "reach_level"
target = "farming"
count = 12
description = "Reach Farming level 12"

[[quest.objectives]]
id = "reach_combat_25"
type = "reach_level"
target = "combat"
count = 25
description = "Reach Combat level 25"

[[quest.objectives]]
id = "gather_gold_2600"
type = "reach_gold"
target = "gold"
count = 2600
description = "Accumulate 2,600 gold"

[quest.rewards]
exp = 1400
gold = 4000
items = [
    { id = "strong_health_potion", count = 2 },
    { id = "prayer_potion", count = 2 },
]

[quest.dialogue]
offer = "Tier III is where real adventurers separate themselves."
accept = "Finish this tier and your foundation is battle-ready."
progress = "Stay on target. Every category matters."
complete = "Excellent execution. You're ready to branch into any path you want."
