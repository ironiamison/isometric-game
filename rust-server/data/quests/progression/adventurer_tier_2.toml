# Adventurer Tasks II - Mid early-game milestone track

[quest]
id = "adventurer_tier_2"
name = "Adventurer Tasks II"
description = "The Adventurer Guide pushes you toward stronger consistency: clear enemy packs, push combat and gathering skills, train smithing, and build a serious gold reserve."
giver_npc = "adventurer_guide"
level_required = 5
repeatable = false
lua_script = "progression/adventurer_tier_2.lua"

[quest.chain]
previous = "adventurer_tier_1"
next = "adventurer_tier_3"

[[quest.objectives]]
id = "kill_blue_slimes"
type = "kill_monster"
target = "slime_blue"
count = 10
description = "Defeat 10 blue slimes"

[[quest.objectives]]
id = "kill_worms"
type = "kill_monster"
target = "worm"
count = 12
description = "Defeat 12 worms"

[[quest.objectives]]
id = "reach_woodcutting_8"
type = "reach_level"
target = "woodcutting"
count = 8
description = "Reach Woodcutting level 8"

[[quest.objectives]]
id = "reach_mining_8"
type = "reach_level"
target = "mining"
count = 8
description = "Reach Mining level 8"

[[quest.objectives]]
id = "reach_smithing_8"
type = "reach_level"
target = "smithing"
count = 8
description = "Reach Smithing level 8"

[[quest.objectives]]
id = "reach_combat_14"
type = "reach_level"
target = "combat"
count = 14
description = "Reach Combat level 14"

[[quest.objectives]]
id = "gather_gold_1200"
type = "reach_gold"
target = "gold"
count = 1200
description = "Accumulate 1,200 gold"

[quest.rewards]
exp = 900
gold = 2200
items = [
    { id = "weak_mana_potion", count = 2 },
    { id = "mithril_axe", count = 1 },
]

[quest.dialogue]
offer = "Tier II focuses on consistency and resource flow."
accept = "Push these milestones and your pace will accelerate."
progress = "Don't rush. Complete each category properly."
complete = "Well executed. Tier III is now open."
