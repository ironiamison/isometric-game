# Farming crop definitions
# Each crop defines what seed is needed, what it produces, level requirements,
# growth timing, harvest yields, and XP rewards.
#
# category    = which patch type the crop must be planted in:
#               "allotment" | "herb" | "cactus" | "tree"
# lives_min/max = how many times the crop can be harvested before the patch empties
#               (rolled at plant time; +1 if the patch was composted). Trees = 1.
# disease_chance = per-growth-cycle probability the crop becomes diseased
#               (compost halves this). A diseased crop dies if not cured in time.

# =============================================================================
# Allotment crops (vegetables) — single harvest, moderate growth
# (capacity-12 beds: one big harvest of the whole bed; compost adds a 2nd life)
# =============================================================================

[potato]
seed_item = "potato_seed"
produce_item = "potato"
level_required = 1
growth_time_minutes = 20
growth_stages = 4
harvest_amount_min = 1
harvest_amount_max = 2
xp_planting = 2
xp_per_harvest = 8
seed_return_chance = 0.15
category = "allotment"
lives_min = 1
lives_max = 1
disease_chance = 0.10

