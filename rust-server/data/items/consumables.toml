# Consumable items - potions, food, etc.

[health_potion]
display_name = "Health Potion"
sprite = "item_health_potion"
description = "Restores 30 HP when consumed."
category = "consumable"
max_stack = 10
base_price = 25
sellable = true

[health_potion.use_effect]
type = "heal"
amount = 30

