# Equipment items - armor, boots, weapons
#
# Skill requirements:
# - Weapons use attack_level_required
# - Armor/boots/gloves/etc use defence_level_required
#
# Combat bonuses:
# - attack_bonus: Increases accuracy (hit chance)
# - strength_bonus: Increases max hit (damage)
# - defence_bonus: Reduces chance of being hit
#
# 4-Tier Balance System:
# | Tier     | Level Req | Attack  | Strength | Defence |
# |----------|-----------|---------|----------|---------|
# | Starter  | 1-10      | +1-4    | +1-3     | +1-5    |
# | Mid      | 20        | +6-12   | +4-8     | +6-12   |
# | Late     | 40        | +14-20  | +10-15   | +14-22  |
# | Endgame  | 60        | +22-30  | +16-22   | +24-35  |

